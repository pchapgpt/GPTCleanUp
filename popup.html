<!DOCTYPE html>
<html>
<head>
    <title>GPTCleanUp</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: ui-sans-serif, -apple-system, "system-ui", "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            padding: 8px;
            background-color: #212121;
            color: #ececec;
            width: 320px;
            font-size: 14px;
            line-height: 20px;
        }

        /* --- Buttons --- */
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 36px;
            padding: 6px 12px;
            margin: 3px 0;
            color: #ececec;
            background-color: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            line-height: 20px;
            text-align: left;
            transition: background-color 0.15s;
        }
        .button:hover {
            background-color: #2f2f2f;
        }
        .button:active {
            background-color: #3a3a3a;
        }
        .button-primary {
            background-color: #2f2f2f;
            color: #fff;
            justify-content: center;
        }
        .button-primary:hover {
            background-color: #3a3a3a;
        }
        .button-danger {
            background-color: rgba(220, 53, 69, 0.15);
            color: #ff6b7a;
            justify-content: center;
        }
        .button-danger:hover {
            background-color: rgba(220, 53, 69, 0.25);
        }
        .button-danger:disabled {
            background-color: transparent;
            color: #555;
            cursor: not-allowed;
        }
        .button-accent {
            background-color: rgba(16, 163, 127, 0.15);
            color: #10a37f;
            justify-content: center;
        }
        .button-accent:hover {
            background-color: rgba(16, 163, 127, 0.25);
        }
        .button-subtle {
            color: #afafaf;
        }
        .button-subtle:hover {
            color: #ececec;
        }

        /* --- Search input --- */
        #searchInput {
            display: block;
            width: 100%;
            height: 36px;
            padding: 6px 12px;
            margin: 3px 0;
            border-radius: 10px;
            border: 1px solid #3a3a3a;
            background-color: #2f2f2f;
            color: #ececec;
            font-size: 14px;
            font-family: inherit;
            line-height: 20px;
            outline: none;
            transition: border-color 0.15s;
        }
        #searchInput:focus {
            border-color: #10a37f;
        }
        #searchInput::placeholder {
            color: #777;
        }

        /* --- Results container --- */
        .results-container {
            margin: 4px 0;
            padding: 0;
            width: 100%;
            min-height: 60px;
            max-height: 380px;
            overflow-y: auto;
            background: transparent;
            border-radius: 10px;
        }
        /* Scrollbar styling */
        .results-container::-webkit-scrollbar {
            width: 6px;
        }
        .results-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .results-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        .results-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* --- Conversation links (browse mode) --- */
        .result-link {
            display: flex;
            align-items: center;
            height: 30px;
            padding: 4px 10px;
            color: #ececec;
            text-decoration: none;
            border-radius: 10px;
            font-size: 13px;
            line-height: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background-color 0.15s;
        }
        .result-link:hover {
            background-color: #2f2f2f;
        }

        /* --- Loading --- */
        #loading {
            display: none;
            text-align: center;
            padding: 20px 0;
            color: #afafaf;
            font-size: 13px;
        }
        #loading-spinner {
            border: 3px solid #3a3a3a;
            border-top: 3px solid #10a37f;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        #loading p {
            margin: 4px 0;
        }
        #loadingWarning {
            font-size: 15px;
            font-weight: 600;
            color: #ececec;
            margin-top: 12px;
        }
        #loadingWarningDetail {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Cleanup mode compact toolbar --- */
        .cleanup-toolbar-row {
            display: flex;
            align-items: center;
            padding: 2px 0;
            gap: 4px;
        }
        .button-inline {
            padding: 4px 8px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #afafaf;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.15s, color 0.15s;
        }
        .button-inline:hover {
            background-color: #2f2f2f;
            color: #ececec;
        }
        #selectionCounter {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        /* --- Bottom action buttons (archive + delete) --- */
        .cleanup-actions-row {
            display: flex;
            gap: 8px;
            margin: 4px 0 0;
        }
        .button-action {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            padding: 6px 12px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            color: #fff;
            transition: background-color 0.15s;
        }
        .button-action:disabled {
            background-color: #2f2f2f;
            color: #555;
            cursor: not-allowed;
        }
        .button-action-archive {
            background-color: rgba(16, 163, 127, 0.6);
        }
        .button-action-archive:hover:not(:disabled) {
            background-color: rgba(16, 163, 127, 0.8);
        }
        .button-action-delete {
            background-color: rgba(220, 53, 69, 0.6);
        }
        .button-action-delete:hover:not(:disabled) {
            background-color: rgba(220, 53, 69, 0.8);
        }

        /* --- Checkbox items (delete mode) --- */
        .checkbox-item {
            display: flex;
            flex-direction: row-reverse;
            align-items: center;
            height: 30px;
            padding: 4px 10px;
            border-radius: 10px;
            transition: background-color 0.15s;
            cursor: pointer;
        }
        .checkbox-item:hover {
            background-color: #2f2f2f;
        }
        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid #555;
            border-radius: 4px;
            background: transparent;
            margin-left: 10px;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            transition: all 0.15s;
        }
        .checkbox-item input[type="checkbox"]:checked {
            background-color: #10a37f;
            border-color: #10a37f;
        }
        .checkbox-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .checkbox-item label {
            flex: 1;
            cursor: pointer;
            color: #ececec;
            font-size: 13px;
            line-height: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Deletion progress --- */
        #deletionProgress {
            display: none;
            margin: 4px 0;
            padding: 8px 12px;
            background-color: rgba(16, 163, 127, 0.1);
            border-radius: 10px;
            font-size: 13px;
        }
        #deletionProgress .progress-title {
            font-weight: 600;
            color: #10a37f;
            margin: 0 0 2px 0;
        }
        #deletionProgress .progress-status {
            margin: 0;
            color: #afafaf;
        }

        /* --- Confirmation overlay --- */
        #confirmOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
        }
        #confirmDialog {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2f2f2f;
            border-radius: 16px;
            padding: 20px;
            width: 290px;
            max-height: 400px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        #confirmDialog h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
            font-weight: 600;
        }
        #confirmDialog .confirm-count {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #afafaf;
        }
        #confirmDialog .confirm-list {
            flex: 1;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 14px;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
            background-color: #212121;
        }
        #confirmDialog .confirm-list::-webkit-scrollbar {
            width: 4px;
        }
        #confirmDialog .confirm-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }
        #confirmDialog .confirm-list div {
            padding: 3px 4px;
            border-bottom: 1px solid #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #confirmDialog .confirm-list div:last-child {
            border-bottom: none;
        }
        #confirmDialog .confirm-buttons {
            display: flex;
            gap: 8px;
        }
        #confirmDialog .confirm-buttons button {
            flex: 1;
            height: 36px;
            padding: 6px 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            color: white;
            transition: background-color 0.15s;
        }
        #confirmCancel {
            background-color: #3a3a3a;
            color: #ececec;
        }
        #confirmCancel:hover {
            background-color: #444;
        }
        #confirmAction {
            background-color: rgba(220, 53, 69, 0.8);
        }
        #confirmAction:hover {
            background-color: rgba(220, 53, 69, 1);
        }
        #confirmAction.confirm-archive {
            background-color: rgba(16, 163, 127, 0.8);
        }
        #confirmAction.confirm-archive:hover {
            background-color: rgba(16, 163, 127, 1);
        }

        /* --- Divider --- */
        .divider {
            height: 1px;
            background-color: #333;
            margin: 6px 0;
        }

        /* --- Empty state / no data --- */
        .empty-state {
            padding: 20px 10px;
            text-align: center;
            color: #777;
            font-size: 13px;
        }

        /* --- Setup / onboarding --- */
        #setupView {
            padding: 16px 4px;
            text-align: center;
        }
        #setupView .setup-icon {
            font-size: 28px;
            margin-bottom: 12px;
            opacity: 0.8;
        }
        #setupView h2 {
            margin: 0 0 6px 0;
            font-size: 15px;
            font-weight: 600;
            color: #ececec;
        }
        #setupView .setup-desc {
            font-size: 13px;
            color: #888;
            margin: 0 0 16px 0;
            line-height: 18px;
        }
        #setupView .setup-step {
            font-size: 12px;
            color: #666;
            margin-top: 12px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .status-dot.connected {
            background-color: #10a37f;
        }
        .status-dot.disconnected {
            background-color: #555;
        }
        #connectionStatus {
            font-size: 12px;
            color: #888;
            padding: 4px 12px;
            margin: 2px 0;
        }

        /* --- Main view status bar --- */
        #mainStatus {
            display: flex;
            align-items: center;
            padding: 4px 12px;
            margin: 2px 0;
            font-size: 12px;
            color: #888;
        }
        #mainConversationCount {
            flex: 1;
        }

        /* --- Settings cog & dropdown --- */
        #settingsWrapper {
            position: relative;
        }
        .icon-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            padding: 0;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
        }
        .icon-button:hover {
            background-color: #2f2f2f;
            color: #ececec;
        }
        .settings-menu {
            display: none;
            position: absolute;
            top: 32px;
            right: 0;
            background: #2f2f2f;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            padding: 4px;
            min-width: 160px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            z-index: 50;
        }
        .settings-menu.open {
            display: block;
        }
        .settings-menu-item {
            display: block;
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #ececec;
            font-size: 13px;
            font-family: inherit;
            text-align: left;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .settings-menu-item:hover {
            background-color: #3a3a3a;
        }
        .settings-menu-item-danger {
            color: #ff6b7a;
        }
    </style>
</head>
<body>
    <!-- Setup view (shown when no API key or no data) -->
    <div id="setupView">
        <div class="setup-icon">&#x1f50d;</div>
        <h2>GPTCleanUp</h2>
        <p class="setup-desc" id="setupDesc">Search and manage your ChatGPT conversations.</p>
        <button id="getKeyButton" class="button button-accent">Connect to ChatGPT</button>
        <button id="fetchButton" class="button button-primary" style="display: none;">Load Conversations</button>
        <div id="connectionStatus"></div>
        <p class="setup-step" id="setupHint">Open chatgpt.com, then click Connect.</p>
    </div>

    <!-- Main view (shown after data is loaded) -->
    <div id="mainView" style="display: none;">
        <!-- Connection status bar -->
        <div id="mainStatus">
            <span id="mainConnectionDot" class="status-dot connected"></span>
            <span id="mainConversationCount"></span>
            <button id="fetchButton2" class="icon-button" title="Refresh History">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M13.5 8a5.5 5.5 0 0 1-9.7 3.5M2.5 8a5.5 5.5 0 0 1 9.7-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    <path d="M3 14v-3h3M13 2v3h-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div id="settingsWrapper">
                <button id="settingsButton" class="icon-button" title="Settings">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M6.6 1.2l-.3 1.5a5 5 0 0 0-1.4.8L3.5 3 2 5l1 1.2a5 5 0 0 0 0 1.6L2 9l1.5 2 1.4-.5a5 5 0 0 0 1.4.8l.3 1.5h3l.3-1.5a5 5 0 0 0 1.4-.8l1.4.5L14 9l-1-1.2a5 5 0 0 0 0-1.6L14 5l-1.5-2-1.4.5a5 5 0 0 0-1.4-.8L9.4 1.2h-3zM8 5.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div id="settingsMenu" class="settings-menu">
                    <button id="clearDataButton" class="settings-menu-item">Clear Cached Data</button>
                    <button id="disconnectButton" class="settings-menu-item settings-menu-item-danger">Disconnect</button>
                </div>
            </div>
        </div>

        <!-- Browse mode toolbar -->
        <div id="browseToolbar">
            <button id="cleanupModeButton" class="button button-subtle">Cleanup Mode</button>
        </div>

        <!-- Cleanup mode toolbar (hidden by default) -->
        <div id="cleanupToolbar" style="display: none;">
            <div class="cleanup-toolbar-row">
                <button id="browseButton" class="button-inline">&larr; Back</button>
                <span id="selectionCounter"><span id="selectedCount">0</span> selected</span>
                <button id="selectAllButton" class="button-inline">Select All</button>
            </div>
        </div>

        <input type="text" id="searchInput" placeholder="Search conversations...">

        <div id="deletionProgress">
            <p class="progress-title" id="progressTitle">Processing...</p>
            <p class="progress-status" id="deletionStatus">Preparing...</p>
        </div>

        <div id="result" class="results-container"></div>

        <div id="cleanupActions" style="display: none;">
            <div class="cleanup-actions-row">
                <button id="archiveSelectedButton" class="button-action button-action-archive" disabled>Archive</button>
                <button id="deleteSelectedButton" class="button-action button-action-delete" disabled>Delete</button>
            </div>
        </div>
    </div>

    <div id="loading">
        <div id="loading-spinner"></div>
        <p id="loadingCount">Loading conversations...</p>
        <p id="loadingTimer">0s elapsed</p>
        <p id="loadingWarning">Keep this window open</p>
        <p id="loadingWarningDetail">Loading 1000+ conversations can take &gt; 60 sec</p>
    </div>

    <!-- Confirmation modal -->
    <div id="confirmOverlay">
        <div id="confirmDialog">
            <h3 id="confirmTitle">Confirm</h3>
            <p class="confirm-count" id="confirmCount"></p>
            <div class="confirm-list" id="confirmList"></div>
            <div class="confirm-buttons">
                <button id="confirmCancel">Cancel</button>
                <button id="confirmAction">Confirm</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
